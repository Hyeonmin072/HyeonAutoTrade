<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCoinTrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">AutoCoinTrade</h1>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">연결 중...</span>
      </div>
      <button class="btn btn-danger btn-sm" id="stopBtn" title="봇 중지">중지</button>
    </header>

    <main class="main">
      <section class="cards">
        <article class="card">
          <h2>상태</h2>
          <dl class="info-list" id="statusInfo">
            <dt>거래소</dt><dd>-</dd>
            <dt>전략</dt><dd>-</dd>
            <dt>모드</dt><dd>-</dd>
            <dt>거래유형</dt><dd>-</dd>
            <dt>AI</dt><dd>-</dd>
          </dl>
        </article>
        <article class="card">
          <h2>잔고 / 손익</h2>
          <dl class="info-list" id="statsInfo">
            <dt>잔고</dt><dd>-</dd>
            <dt>초기잔고</dt><dd>-</dd>
            <dt>포지션</dt><dd>-</dd>
            <dt>실현손익</dt><dd>-</dd>
            <dt>미실현손익</dt><dd>-</dd>
            <dt>총 수익률</dt><dd>-</dd>
          </dl>
        </article>
      </section>

      <section class="section">
        <h2>실시간 가격</h2>
        <div class="price-grid" id="priceGrid"></div>
      </section>

      <section class="section">
        <h2>AI 분석 / 신호 인사이트</h2>
        <div class="insights-grid" id="aiInsightsGrid">
          <p class="empty">데이터 수집 중...</p>
        </div>
      </section>

      <section class="section tabs-section">
        <div class="tabs">
          <button class="tab-btn active" data-tab="balances">보유 코인</button>
          <button class="tab-btn" data-tab="positions">포지션</button>
          <button class="tab-btn" data-tab="trades">최근 거래</button>
        </div>
        <div class="tab-panels">
          <div class="tab-panel active" id="panel-balances">
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>코인</th>
                    <th>총 보유</th>
                    <th>사용 가능</th>
                    <th>주문 사용</th>
                  </tr>
                </thead>
                <tbody id="balancesBody">
                  <tr><td colspan="4" class="empty">로딩 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="tab-panel" id="panel-positions">
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>심볼</th>
                    <th>진입가</th>
                    <th>현재가</th>
                    <th>수량</th>
                    <th>손익</th>
                    <th>손익률</th>
                  </tr>
                </thead>
                <tbody id="positionsBody">
                  <tr><td colspan="6" class="empty">포지션 없음</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="tab-panel" id="panel-trades">
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>시간</th>
                    <th>심볼</th>
                    <th>액션</th>
                    <th>수량</th>
                    <th>가격</th>
                    <th>손익</th>
                    <th>거래 근거</th>
                  </tr>
                </thead>
                <tbody id="tradesBody">
                  <tr><td colspan="7" class="empty">거래 내역 없음</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>로컬 전용 · 자동 새로고침 3초</span>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
