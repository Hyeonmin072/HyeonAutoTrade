# =============================================================================
# AutoCoinTrade - Docker Compose
# =============================================================================
# 로컬 개발/테스트용 Docker Compose 설정

version: '3.8'

services:
  autocointrade:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autocointrade
    restart: unless-stopped
    environment:
      # 거래소 API (환경변수)
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - UPBIT_ACCESS_KEY=${UPBIT_ACCESS_KEY}
      - UPBIT_SECRET_KEY=${UPBIT_SECRET_KEY}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Slack
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      # 실행 모드
      - DRY_RUN=${DRY_RUN:-true}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - autocoin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 선택적: Redis (캐싱용)
  redis:
    image: redis:7-alpine
    container_name: autocoin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - autocoin-network
    command: redis-server --appendonly yes

  # 선택적: PostgreSQL (상태 저장용)
  postgres:
    image: postgres:15-alpine
    container_name: autocoin-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=autocointrade
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - autocoin-network

networks:
  autocoin-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
